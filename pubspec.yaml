name: openapi_gen
description: Generates Dart REST clients and data classes from OpenAPI (v2/v3) schemas — no copy-paste required.
version: 1.1.0
repository: https://github.com/arcticfox1919/openapi_gen
topics:
  - openapi
  - codegen
  - api
  - rest
environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  args: ^2.5.0
  collection: ^1.18.0
  gio: ^0.2.2
  meta: ^1.12.0
  path: ^1.9.0
  yaml: ^3.1.2

dev_dependencies:
  lints: ^6.1.0
  test: ^1.30.0
